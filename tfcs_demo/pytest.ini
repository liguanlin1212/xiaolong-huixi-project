[pytest]
# 测试目录
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 报告格式
addopts = -v --tb=short

# 代码覆盖率配置
# coverage_report = html
# coverage_dir = coverage
# python_files = ai/**/*.py app/**/*.py core/**/*.py

# 日志配置
log_level = INFO
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s

# 环境变量
# env = 
#     PYTHONPATH=.
